# ─────────────────────────────────────────
# APPLICATION
# ─────────────────────────────────────────
spring.application.name=job-engine

# ─────────────────────────────────────────
# H2 EMBEDDED DATABASE
# ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:jobengine;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─────────────────────────────────────────
# JPA / HIBERNATE
# ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ─────────────────────────────────────────
# H2 CONSOLE
# access at: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:jobengine
# ─────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─────────────────────────────────────────
# JOB ENGINE CONFIG (our custom properties)
# ─────────────────────────────────────────
job.engine.worker-pool-size=5
job.engine.event-loop-interval-ms=500
job.engine.max-retry-count=3
job.engine.retry-backoff-ms=5000

# ─────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────
logging.level.com.scheduler=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n